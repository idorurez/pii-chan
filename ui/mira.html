<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mira</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
        }

        #avatar {
            position: relative;
            width: 100vh;
            height: 100vh;
            max-width: 100vw;
            max-height: 100vh;
        }

        #avatar img, #avatar video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.25s ease-in-out;
        }

        #avatar img.active, #avatar video.active {
            opacity: 1;
        }

        /* Subtle idle breathing animation */
        @keyframes breathe {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-3px) scale(1.003); }
        }

        #avatar.idle {
            animation: breathe 4s ease-in-out infinite;
        }

        /* Talking bob — gentle sway */
        @keyframes talkBob {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-2px); }
        }

        #avatar.talking {
            animation: talkBob 0.8s ease-in-out infinite;
        }

        /* Blink overlay */
        #blink-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            opacity: 0;
            transition: opacity 0.08s ease-in-out;
            z-index: 10;
        }

        #blink-overlay.blink {
            opacity: 1;
        }

        #status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            z-index: 100;
            padding: 8px 14px;
            font-family: monospace;
            font-size: 13px;
            pointer-events: none;
            opacity: 0.85;
            transition: opacity 0.5s;
        }

        .status-group {
            display: flex;
            gap: 14px;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green { background: #0f0; box-shadow: 0 0 4px #0f0; }
        .dot.yellow { background: #fa0; box-shadow: 0 0 4px #fa0; }
        .dot.red { background: #f44; box-shadow: 0 0 4px #f44; }
        .dot.gray { background: #555; }

        .status-label { color: #aaa; }
        .status-value { color: #fff; }
    </style>
</head>
<body>

<div id="avatar" class="idle">
    <!-- Video animations (looping, preferred over static PNGs when available) -->
    <video id="vid-neutral" src="avatar/mira/animations/mira_neutral.mp4" loop muted playsinline preload="auto"></video>
    <video id="vid-thinking" src="avatar/mira/animations/mira_thinking_v04.mp4" loop muted playsinline preload="auto"></video>

    <!-- Static PNG fallbacks for expressions without video -->
    <img id="expr-neutral" src="avatar/mira/expressions/mira_neutral.png">
    <img id="expr-happy" src="avatar/mira/expressions/mira_happy.png">
    <img id="expr-sad" src="avatar/mira/expressions/mira_neutral.png">
    <img id="expr-surprised" src="avatar/mira/expressions/mira_surprised.png">
    <img id="expr-thinking" src="avatar/mira/expressions/mira_thinking.png">
    <img id="expr-talking" src="avatar/mira/expressions/mira_talking.png">
    <img id="expr-sleepy" src="avatar/mira/expressions/mira_sleepy.png">
    <img id="expr-confused" src="avatar/mira/expressions/mira_confused.png">
    <img id="expr-excited" src="avatar/mira/expressions/mira_happy.png">
    <img id="expr-angry" src="avatar/mira/expressions/mira_confused.png">
    <img id="blink-overlay" src="avatar/mira/expressions/mira_eyes_closed.png">
</div>

<div id="status-bar">
    <div class="status-group">
        <div class="status-item" id="st-face">
            <span class="dot gray" id="dot-face"></span>
            <span class="status-label">Face</span>
            <span class="status-value" id="val-face">--</span>
        </div>
    </div>
    <div class="status-group">
        <div class="status-item" id="st-gateway">
            <span class="dot gray" id="dot-gateway"></span>
            <span class="status-label">Gateway</span>
            <span class="status-value" id="val-gateway">--</span>
        </div>
        <div class="status-item" id="st-net">
            <span class="dot gray" id="dot-net"></span>
            <span class="status-label">Net</span>
            <span class="status-value" id="val-net">--</span>
        </div>
    </div>
</div>

<script>
const avatarEl = document.getElementById('avatar');
const blinkEl = document.getElementById('blink-overlay');

// Status indicators
const dotFace = document.getElementById('dot-face');
const valFace = document.getElementById('val-face');
const dotGateway = document.getElementById('dot-gateway');
const valGateway = document.getElementById('val-gateway');
const dotNet = document.getElementById('dot-net');
const valNet = document.getElementById('val-net');

function setStatus(dot, val, color, text) {
    dot.className = 'dot ' + color;
    val.textContent = text;
}

let currentExpression = 'neutral';
let isSpeaking = false;
let talkInterval = null;
let blinkTimer = null;
let usingVideo = false; // true when current expression has a video playing

// Map of expressions that have video animations
const VIDEO_MAP = {
    'neutral': 'vid-neutral',
    'thinking': 'vid-thinking',
};

// === EXPRESSION SWITCHING ===

function setExpression(name) {
    if (name === currentExpression) return;

    // Deactivate current expression (video or image)
    const curVid = VIDEO_MAP[currentExpression] ? document.getElementById(VIDEO_MAP[currentExpression]) : null;
    const curImg = document.getElementById('expr-' + currentExpression);
    if (curVid && usingVideo) {
        curVid.classList.remove('active');
        curVid.pause();
    }
    if (curImg) curImg.classList.remove('active');

    // Activate new expression — prefer video if available
    const newVid = VIDEO_MAP[name] ? document.getElementById(VIDEO_MAP[name]) : null;
    if (newVid) {
        newVid.currentTime = 0;
        newVid.play().catch(() => {});
        newVid.classList.add('active');
        usingVideo = true;
        // Video has its own animation — disable breathing + blinking overlays
        avatarEl.classList.remove('idle');
        stopBlink();
    } else {
        const newImg = document.getElementById('expr-' + name);
        if (!newImg) {
            console.warn('Unknown expression:', name);
            return;
        }
        newImg.classList.add('active');
        usingVideo = false;
        // Static PNG — re-enable breathing + blinking
        if (!isSpeaking) {
            avatarEl.classList.add('idle');
            scheduleBlink();
        }
    }

    currentExpression = name;
    console.log('Expression:', name, usingVideo ? '(video)' : '(png)');
}

// === SPEAKING ANIMATION ===
// Alternate between talking mouth and current expression

function startSpeaking() {
    if (isSpeaking) return;
    isSpeaking = true;
    avatarEl.classList.remove('idle');
    avatarEl.classList.add('talking');
    stopBlink();

    // Pause any active video during speaking
    const curVid = VIDEO_MAP[currentExpression] ? document.getElementById(VIDEO_MAP[currentExpression]) : null;
    if (curVid && usingVideo) {
        curVid.classList.remove('active');
        curVid.pause();
    }

    // Show talking image on top with opacity fading for smooth mouth movement
    const talkImg = document.getElementById('expr-talking');
    talkImg.style.transition = 'opacity 0.2s ease-in-out';
    talkImg.style.opacity = '1';
    talkImg.classList.add('active');

    let mouthOpen = true;
    talkInterval = setInterval(() => {
        if (!isSpeaking) return;
        mouthOpen = !mouthOpen;
        talkImg.style.opacity = mouthOpen ? '1' : '0.3';
    }, 300 + Math.random() * 200);
}

function stopSpeaking() {
    if (!isSpeaking) return;
    isSpeaking = false;
    avatarEl.classList.remove('talking');
    avatarEl.classList.add('idle');

    if (talkInterval) {
        clearInterval(talkInterval);
        talkInterval = null;
    }

    // Hide talking frame
    const talkImg = document.getElementById('expr-talking');
    talkImg.style.opacity = '0';
    talkImg.classList.remove('active');

    // Restore current expression — video or image
    const curVid = VIDEO_MAP[currentExpression] ? document.getElementById(VIDEO_MAP[currentExpression]) : null;
    if (curVid && usingVideo) {
        curVid.play().catch(() => {});
        curVid.classList.add('active');
    } else {
        document.getElementById('expr-' + currentExpression)?.classList.add('active');
        scheduleBlink();
    }
}

// === BLINKING ===

function doBlink() {
    if (isSpeaking || usingVideo) return; // video has blinks baked in
    blinkEl.classList.add('blink');
    setTimeout(() => {
        blinkEl.classList.remove('blink');
        scheduleBlink();
    }, 120 + Math.random() * 80);
}

function scheduleBlink() {
    if (blinkTimer) clearTimeout(blinkTimer);
    // Blink every 3-6 seconds
    blinkTimer = setTimeout(doBlink, 3000 + Math.random() * 3000);
}

function stopBlink() {
    if (blinkTimer) clearTimeout(blinkTimer);
    blinkEl.classList.remove('blink');
}

// === FACE WEBSOCKET ===

function connectWebSocket() {
    const wsUrl = `ws://${window.location.hostname}:18793`;
    setStatus(dotFace, valFace, 'yellow', 'connecting...');

    try {
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            faceConnected = true;
            setStatus(dotFace, valFace, 'green', 'online');
        };

        ws.onmessage = (event) => {
            try {
                const state = JSON.parse(event.data);
                applyState(state);

                // Update gateway status from state if provided
                if (state.gatewayConnected !== undefined) {
                    if (state.gatewayConnected) {
                        const ago = state.gatewayLastConnected
                            ? formatAgo(state.gatewayLastConnected)
                            : '';
                        setStatus(dotGateway, valGateway, 'green', 'online' + (ago ? ' · ' + ago : ''));
                    } else {
                        const ago = state.gatewayLastConnected
                            ? formatAgo(state.gatewayLastConnected)
                            : '';
                        setStatus(dotGateway, valGateway, 'red', 'offline' + (ago ? ' · last ' + ago : ''));
                    }
                }
            } catch (e) {
                console.warn('Bad message:', e);
            }
        };

        ws.onclose = () => {
            setStatus(dotFace, valFace, 'red', 'offline');
            setTimeout(connectWebSocket, 3000);
        };

        ws.onerror = () => {
            setStatus(dotFace, valFace, 'red', 'error');
        };
    } catch (e) {
        setStatus(dotFace, valFace, 'red', 'error');
    }
}

// === NETWORK CHECK ===

function checkNetwork() {
    if (navigator.onLine) {
        // Verify with a real fetch
        fetch('https://httpbin.org/get', { mode: 'no-cors', cache: 'no-store' })
            .then(() => setStatus(dotNet, valNet, 'green', 'online'))
            .catch(() => setStatus(dotNet, valNet, 'red', 'no internet'));
    } else {
        setStatus(dotNet, valNet, 'red', 'offline');
    }
}

window.addEventListener('online', () => checkNetwork());
window.addEventListener('offline', () => setStatus(dotNet, valNet, 'red', 'offline'));

function formatAgo(epochSec) {
    if (!epochSec) return '';
    const diff = Math.floor(Date.now() / 1000 - epochSec);
    if (diff < 5) return 'just now';
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

function applyState(state) {
    // Handle speaking state changes first
    if (state.isSpeaking !== undefined) {
        if (state.isSpeaking && !isSpeaking) {
            startSpeaking();
        } else if (!state.isSpeaking && isSpeaking) {
            stopSpeaking();
        }
    }

    // Apply expression (but not 'talking' — that's handled by speaking animation)
    if (state.expression && state.expression !== 'talking') {
        setExpression(state.expression);
    }
}

// === KEYBOARD CONTROLS (for testing) ===

document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case '1': setExpression('neutral'); break;
        case '2': setExpression('happy'); break;
        case '3': setExpression('sad'); break;
        case '4': setExpression('surprised'); break;
        case '5': setExpression('thinking'); break;
        case '6': setExpression('confused'); break;
        case '7': setExpression('excited'); break;
        case '8': setExpression('sleepy'); break;
        case 's': isSpeaking ? stopSpeaking() : startSpeaking(); break;
        case 'b': doBlink(); break;
    }
});

// === START ===

setStatus(dotFace, valFace, 'gray', '--');
setStatus(dotGateway, valGateway, 'gray', '--');
setStatus(dotNet, valNet, 'gray', 'checking...');

// Start with neutral video if available
const initVid = document.getElementById('vid-neutral');
if (initVid) {
    initVid.play().then(() => {
        initVid.classList.add('active');
        usingVideo = true;
    }).catch(() => {
        // Video failed (autoplay blocked?), fall back to static PNG
        document.getElementById('expr-neutral').classList.add('active');
        usingVideo = false;
        scheduleBlink();
    });
} else {
    document.getElementById('expr-neutral').classList.add('active');
    scheduleBlink();
}

connectWebSocket();
checkNetwork();
setInterval(checkNetwork, 30000);

// Auto-reload if face server never connects within 15s
// (handles case where Chromium loads before server is up)
let faceConnected = false;
const origOnOpen = null;
setTimeout(() => {
    if (!faceConnected) {
        console.log('Face server not reachable, reloading...');
        location.reload();
    }
}, 15000);
</script>

</body>
</html>
