<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Mira - Live2D Test</title>
    <style>
        * { margin: 0; padding: 0; }
        body {
            background: #111;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        canvas { display: block; }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
        }
        #status.error { color: #f44; }
        #status.warn { color: #fa0; }
        #controls {
            position: fixed;
            bottom: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 4px;
            color: #fff;
            font-family: monospace;
            font-size: 12px;
        }
        #controls button {
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 4px 8px;
            margin: 2px;
            cursor: pointer;
            border-radius: 3px;
            font-family: monospace;
        }
        #controls button:hover { background: #555; }
        #fps {
            position: fixed;
            top: 10px;
            right: 10px;
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            z-index: 100;
            background: rgba(0,0,0,0.7);
            padding: 8px 12px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div id="status">Loading... (v3)</div>
<div id="fps">FPS: --</div>

<div id="controls" style="display:none">
    <div><b>Expression Test</b> (or press 1-9)</div>
    <div>
        <button onclick="setExpressionTarget('neutral')">Neutral</button>
        <button onclick="setExpressionTarget('happy')">Happy</button>
        <button onclick="setExpressionTarget('sad')">Sad</button>
        <button onclick="setExpressionTarget('surprised')">Surprised</button>
        <button onclick="setExpressionTarget('angry')">Angry</button>
    </div>
    <div style="margin-top:8px"><b>Parameters</b></div>
    <div>
        Mouth: <input type="range" id="mouthSlider" min="0" max="100" value="0"
               oninput="overrides.ParamMouthOpenY = this.value/100; document.getElementById('mouthVal').textContent = (this.value/100).toFixed(2)">
        <span id="mouthVal">0</span>
    </div>
    <div>
        Eye X: <input type="range" id="eyeXSlider" min="-100" max="100" value="0"
               oninput="overrides.ParamEyeBallX = this.value/100">
        Eye Y: <input type="range" id="eyeYSlider" min="-100" max="100" value="0"
               oninput="overrides.ParamEyeBallY = this.value/100">
    </div>
    <div style="margin-top:4px; color:#888">
        Press 'd' to toggle controls | Move mouse for eye tracking
    </div>
</div>

<!-- PixiJS -->
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>

<!-- Live2D Cubism Core (Cubism 4) -->
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>

<!-- pixi-live2d-display -->
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

<script>
const statusEl = document.getElementById('status');
const fpsEl = document.getElementById('fps');
const controls = document.getElementById('controls');

// FPS counter
let frameCount = 0;
let lastFpsTime = performance.now();

// Check for Live2D core
if (typeof Live2DCubismCore === 'undefined') {
    statusEl.textContent = 'ERROR: Live2D Cubism Core not loaded';
    statusEl.className = 'error';
    throw new Error('Cubism Core not loaded');
}

// Create PixiJS app
const app = new PIXI.Application({
    view: document.createElement('canvas'),
    autoStart: true,
    resizeTo: window,
    backgroundColor: 0x111111,
    antialias: true,
});
document.body.appendChild(app.view);

// === STATE ===
let model = null;
let wsConnected = false;
let currentlySpeaking = false;

// Parameter overrides — these get applied EVERY FRAME after the model's internal update
// This is the key: the model's motions/physics run first, then we force our values on top
const overrides = {};

const MODEL_PATH = 'live2d_sample/Hiyori.model3.json';

async function loadModel() {
    statusEl.textContent = 'Loading Live2D model...';

    try {
        model = await PIXI.live2d.Live2DModel.from(MODEL_PATH, {
            autoInteract: false,
        });

        // Scale and position
        const scale = Math.min(
            window.innerWidth / model.width,
            window.innerHeight / model.height
        ) * 0.8;
        model.scale.set(scale);
        model.x = window.innerWidth / 2;
        model.y = window.innerHeight / 2;
        model.anchor.set(0.5, 0.5);

        app.stage.addChild(model);

        // Hook into the motion manager's update to apply our overrides AFTER motions run
        // This is the documented approach from pixi-live2d-display
        const origMgrUpdate = model.internalModel.motionManager.update.bind(
            model.internalModel.motionManager
        );
        model.internalModel.motionManager.update = (...args) => {
            const result = origMgrUpdate(...args);
            const cm = model.internalModel.coreModel;

            // Speaking mouth animation — override LipSync param after motions
            if (currentlySpeaking) {
                const t = performance.now() / 120;
                const mouth = 0.4 + Math.sin(t) * 0.25 + Math.sin(t * 2.7) * 0.15;
                cm.setParameterValueById('ParamMouthOpenY', Math.max(0, mouth));
            }

            // Apply all parameter overrides after motions
            for (const [param, value] of Object.entries(overrides)) {
                cm.setParameterValueById(param, value);
            }

            return result;
        };

        // FPS counter on ticker
        app.ticker.add(() => {
            frameCount++;
            const now = performance.now();
            if (now - lastFpsTime >= 1000) {
                fpsEl.textContent = `FPS: ${frameCount}`;
                frameCount = 0;
                lastFpsTime = now;
            }
        });

        statusEl.textContent = 'Model loaded (v3)';
        statusEl.className = '';
        controls.style.display = 'block';

        connectWebSocket();

        console.log('Model loaded successfully (v3)');

    } catch (e) {
        statusEl.textContent = `ERROR: ${e.message}`;
        statusEl.className = 'error';
        console.error('Failed to load model:', e);

        if (e.message.includes('404') || e.message.includes('fetch')) {
            statusEl.textContent = 'Model not found. See console for setup instructions.';
            console.log(`
=== LIVE2D TEST SETUP ===

1. Download a free sample model from:
   https://www.live2d.com/en/sdk/download/web/

2. Place the model files in:
   ui/live2d_sample/

3. Reload this page.
`);
        }
    }
}

// === EXPRESSION TARGETS ===
// Instead of setting params once, we store them as persistent overrides

function setExpressionTarget(name) {
    // Clear previous expression overrides
    delete overrides.ParamEyeLOpen;
    delete overrides.ParamEyeROpen;
    delete overrides.ParamEyeLSmile;
    delete overrides.ParamEyeRSmile;
    delete overrides.ParamMouthForm;
    delete overrides.ParamBrowLY;
    delete overrides.ParamBrowRY;
    delete overrides.ParamBrowLAngle;
    delete overrides.ParamBrowRAngle;
    delete overrides.ParamMouthOpenY;

    const expressions = {
        neutral: {
            ParamEyeLOpen: 1.0,
            ParamEyeROpen: 1.0,
            ParamMouthForm: 0,
            ParamBrowLY: 0,
            ParamBrowRY: 0,
        },
        happy: {
            ParamEyeLSmile: 1.0,
            ParamEyeRSmile: 1.0,
            ParamMouthForm: 1.0,
        },
        sad: {
            ParamBrowLY: -0.5,
            ParamBrowRY: -0.5,
            ParamMouthForm: -0.5,
            ParamEyeLOpen: 0.7,
            ParamEyeROpen: 0.7,
        },
        surprised: {
            ParamEyeLOpen: 1.3,
            ParamEyeROpen: 1.3,
            ParamBrowLY: 1.0,
            ParamBrowRY: 1.0,
            ParamMouthOpenY: 0.5,
        },
        angry: {
            ParamBrowLY: -1.0,
            ParamBrowRY: -1.0,
            ParamBrowLAngle: -0.5,
            ParamBrowRAngle: -0.5,
            ParamMouthForm: -0.7,
        },
        talking: {
            // mouth handled by currentlySpeaking in ticker
        },
        thinking: {
            ParamEyeBallX: 0.3,
            ParamEyeBallY: 0.2,
            ParamAngleX: 5,
            ParamAngleY: 3,
        },
    };

    if (expressions[name]) {
        Object.assign(overrides, expressions[name]);
    }
}

// === MOUSE EYE TRACKING ===

document.addEventListener('mousemove', (e) => {
    if (!model) return;
    const x = (e.clientX / window.innerWidth) * 2 - 1;
    const y = (e.clientY / window.innerHeight) * 2 - 1;
    overrides.ParamEyeBallX = x * 0.8;
    overrides.ParamEyeBallY = -y * 0.5;
    overrides.ParamAngleX = x * 15;
    overrides.ParamAngleY = -y * 10;
});

// === KEYBOARD CONTROLS ===

document.addEventListener('keydown', (e) => {
    switch(e.key) {
        case 'd': controls.style.display = controls.style.display === 'none' ? 'block' : 'none'; break;
        case '1': setExpressionTarget('neutral'); break;
        case '2': setExpressionTarget('happy'); break;
        case '3': setExpressionTarget('sad'); break;
        case '4': setExpressionTarget('surprised'); break;
        case '5': setExpressionTarget('angry'); break;
    }
});

// === WEBSOCKET CONNECTION TO FACE SERVER ===

function connectWebSocket() {
    const wsUrl = `ws://${window.location.hostname}:18793`;
    statusEl.textContent += ' | Connecting...';

    try {
        const ws = new WebSocket(wsUrl);

        ws.onopen = () => {
            wsConnected = true;
            statusEl.textContent = 'Connected (v3)';
            statusEl.className = '';
        };

        ws.onmessage = (event) => {
            try {
                const state = JSON.parse(event.data);
                applyFaceState(state);
            } catch (e) {
                console.warn('Bad message:', e);
            }
        };

        ws.onclose = () => {
            wsConnected = false;
            statusEl.textContent = 'Disconnected (standalone)';
            statusEl.className = 'warn';
            setTimeout(connectWebSocket, 5000);
        };

        ws.onerror = () => {
            statusEl.textContent = 'No server (standalone)';
            statusEl.className = 'warn';
        };
    } catch (e) {
        statusEl.textContent = 'Standalone mode';
        statusEl.className = 'warn';
    }
}

function applyFaceState(state) {
    if (!model) return;

    if (state.mouthOpen !== undefined && !currentlySpeaking) {
        overrides.ParamMouthOpenY = state.mouthOpen;
    }
    if (state.eyeTargetX !== undefined) {
        overrides.ParamEyeBallX = state.eyeTargetX * 0.8;
        overrides.ParamAngleX = state.eyeTargetX * 15;
    }
    if (state.eyeTargetY !== undefined) {
        overrides.ParamEyeBallY = state.eyeTargetY * 0.5;
        overrides.ParamAngleY = state.eyeTargetY * 10;
    }
    if (state.expression) {
        setExpressionTarget(state.expression);
    }
    if (state.isSpeaking !== undefined) {
        currentlySpeaking = state.isSpeaking;
        if (!state.isSpeaking) {
            delete overrides.ParamMouthOpenY;
        }
    }
}

// === WINDOW RESIZE ===

window.addEventListener('resize', () => {
    if (!model) return;
    model.x = window.innerWidth / 2;
    model.y = window.innerHeight / 2;
});

// === START ===

loadModel();
</script>

</body>
</html>
