# Mira Configuration
# Copy to config.yaml and adjust as needed

llm:
  model_path: ./models/qwen2.5-1.5b-instruct-q4_k_m.gguf
  context_size: 4096
  max_tokens: 100
  temperature: 0.8
  top_p: 0.9

voice:
  # TTS engine: "kokoro", "voicevox", "auto", or "mock"
  # "auto" routes Japanese text → VOICEVOX, English → Kokoro
  engine: auto
  # Kokoro English voice (see models/kokoro/voices-v1.0.bin for options)
  kokoro_voice: af_alloy
  # VOICEVOX speaker style_id (14 = 冥鳴ひまり)
  speaker_id: 14
  speed: 1.1
  # Volume: 0.0 (silent) to 1.0 (full). Default: 0.3
  volume: 0.3

voice_input:
  enabled: true
  stt_engine: vosk
  vosk_model_path: ./models/vosk-model-small-en-us-0.15
  wake_word_engine: openwakeword
  # Available wake words: hey_jarvis, alexa, etc.
  wake_word: hey_jarvis
  wake_word_threshold: 0.5
  max_record_seconds: 5.0
  silence_threshold: 0.01
  silence_duration: 1.0

audio:
  # sounddevice device indices (run: python -c "import sounddevice; print(sounddevice.query_devices())")
  # null = use system default
  input_device: null   # mic index
  output_device: null  # speaker index

can:
  interface: mock
  channel: can0
  dbc_path: ./data/toyota_sienna.dbc
  bitrate: 500000

display:
  enabled: true
  width: 800
  height: 480
  fullscreen: false
  fps: 30

brain:
  think_interval: 3.0
  speech_cooldown: 30.0
  recent_events_window: 300
  personality_path: ./data/personality.md

db_path: ./data/sessions.db
