<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- A-Pose Skeleton for ControlNet -->
  <!-- Arms at ~45° angle - better for rigging than T-pose -->
  <!-- Black background -->
  <rect width="1024" height="1024" fill="#000000"/>
  
  <!-- Stick figure in white -->
  <g stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none">
    <!-- Head -->
    <circle cx="512" cy="120" r="55" fill="#ffffff"/>
    
    <!-- Neck -->
    <line x1="512" y1="175" x2="512" y2="240"/>
    
    <!-- Spine -->
    <line x1="512" y1="240" x2="512" y2="520"/>
    
    <!-- Arms (A-pose: ~45° down from horizontal) -->
    <!-- Left arm: shoulder to elbow -->
    <line x1="512" y1="260" x2="320" y2="380"/>
    <!-- Left arm: elbow to hand -->
    <line x1="320" y1="380" x2="180" y2="480"/>
    
    <!-- Right arm: shoulder to elbow -->
    <line x1="512" y1="260" x2="704" y2="380"/>
    <!-- Right arm: elbow to hand -->
    <line x1="704" y1="380" x2="844" y2="480"/>
    
    <!-- Shoulders -->
    <circle cx="512" cy="260" r="15" fill="#ffffff"/>
    
    <!-- Elbows -->
    <circle cx="320" cy="380" r="10" fill="#ffffff"/>
    <circle cx="704" cy="380" r="10" fill="#ffffff"/>
    
    <!-- Hands (palms facing inward toward body) -->
    <circle cx="180" cy="480" r="12" fill="#ffffff"/>
    <circle cx="844" cy="480" r="12" fill="#ffffff"/>
    
    <!-- Hips -->
    <line x1="420" y1="520" x2="604" y2="520"/>
    <circle cx="512" cy="520" r="15" fill="#ffffff"/>
    
    <!-- Left leg -->
    <line x1="420" y1="520" x2="390" y2="720"/>
    <line x1="390" y1="720" x2="370" y2="900"/>
    
    <!-- Right leg -->
    <line x1="604" y1="520" x2="634" y2="720"/>
    <line x1="634" y1="720" x2="654" y2="900"/>
    
    <!-- Knees -->
    <circle cx="390" cy="720" r="10" fill="#ffffff"/>
    <circle cx="634" cy="720" r="10" fill="#ffffff"/>
    
    <!-- Feet -->
    <circle cx="370" cy="900" r="12" fill="#ffffff"/>
    <circle cx="654" cy="900" r="12" fill="#ffffff"/>
  </g>
</svg>
